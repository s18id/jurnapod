# Jurnapod SLO Configuration
# Epic 11: Operational Trust and Scale Readiness
# Generated: 2026-03-22

version: "1.0"
measurement_window_days: 28

# NFR Alignment:
# - POS p95 < 1s
# - sync completion < 30s
# - report p95 < 5s
# - business-hours availability >= 99.9%

# Business Hours Definition
# Used for availability SLOs that are measured during business hours only
business_hours:
  default:
    start_hour: 9   # 9:00 AM local time
    end_hour: 17    # 5:00 PM local time
    timezone: " outlet"  # Resolved per-outlet from company settings
    weekdays: [1, 2, 3, 4, 5]  # Monday=1 through Friday=5
  description: "Business hours are defined per-outlet based on outlet timezone settings. Default is 9 AM - 5 PM local time, Monday through Friday."

flows:
  payment_capture:
    description: "POS payment processing"
    owner: "POS Team"
    slis:
      - type: latency
        target: "< 1s"
        target_value: 1.0
        unit: seconds
        percentile: p95
        histogram_buckets: [0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
      - type: availability
        target: ">= 99.9%"
        target_value: 99.9
        unit: percent
        business_hours_only: true

  offline_local_commit:
    description: "Offline transaction commit durability"
    owner: "POS Team"
    slis:
      - type: success_rate
        target: ">= 99.9%"
        target_value: 99.9
        unit: percent

  sync_replay_idempotency:
    description: "Sync replay with deduplication"
    owner: "Sync Team"
    slis:
      - type: duplicate_rate
        target: "< 0.01%"
        target_value: 0.01
        unit: percent
      - type: latency
        target: "< 30s"
        target_value: 30.0
        unit: seconds
        percentile: p95
        histogram_buckets: [0.1, 0.5, 1, 5, 10, 20, 30, 60]

  pos_to_gl_posting:
    description: "POS to GL journal entry posting"
    owner: "GL Team"
    slis:
      - type: latency
        target: "< 5s"
        target_value: 5.0
        unit: seconds
        percentile: p95
        histogram_buckets: [0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30]
      - type: accuracy
        target: "100%"
        target_value: 100.0
        unit: percent
        description: "Zero drift accuracy for GL posting"

  trial_balance:
    description: "Trial balance report generation"
    owner: "Reports Team"
    slis:
      - type: latency
        target: "< 5s"
        target_value: 5.0
        unit: seconds
        percentile: p95
        histogram_buckets: [0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30]

  general_ledger:
    description: "General ledger report generation"
    owner: "Reports Team"
    slis:
      - type: latency
        target: "< 5s"
        target_value: 5.0
        unit: seconds
        percentile: p95
        histogram_buckets: [0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30]

# Correlation ID propagation per flow
correlation:
  payment_capture:
    request_id: generated
    client_tx_id: required
    journal_batch_id: "-"
    trace_id: propagated
  offline_local_commit:
    request_id: generated
    client_tx_id: required
    journal_batch_id: "-"
    trace_id: propagated
  sync_replay_idempotency:
    request_id: generated
    client_tx_id: required
    journal_batch_id: "-"
    trace_id: propagated
  pos_to_gl_posting:
    request_id: generated
    client_tx_id: "-"
    journal_batch_id: required
    trace_id: propagated
  trial_balance:
    request_id: generated
    client_tx_id: "-"
    journal_batch_id: "-"
    trace_id: propagated
  general_ledger:
    request_id: generated
    client_tx_id: "-"
    journal_batch_id: "-"
    trace_id: propagated

# Cardinality-safe labels (allowed in metrics/traces)
safe_labels:
  - company_id
  - outlet_id
  - flow_name
  - status
  - error_class

# Forbidden labels (high cardinality or PII)
forbidden_labels:
  - user_id
  - transaction_id
  - item_id
  - customer_id
  - email
  - name
  - card_number
  - phone
  - address
