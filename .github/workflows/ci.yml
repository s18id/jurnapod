name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run monorepo build
        run: npm run build

      - name: Run typecheck across all workspaces
        run: npm run typecheck --workspaces --if-present

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            packages/*/dist
            packages/modules/*/dist
          retention-days: 1

  lint:
    name: ESLint (workspace boundary checks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint across all workspaces
        run: npm run lint --workspaces --if-present

  test:
    name: Test (zero failures)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: mariadb
          MYSQL_DATABASE: jurnapod
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    timeout-minutes: 30
    needs: build

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mariadb
      DB_NAME: jurnapod
      JP_COMPANY_CODE: JP
      JP_COMPANY_NAME: Jurnapod Demo
      JP_OUTLET_CODE: MAIN
      JP_OUTLET_NAME: Main Outlet
      JP_OWNER_EMAIL: owner@example.com
      JP_OWNER_PASSWORD: ChangeMe123!
      # SUPER_ADMIN user for platform management
      JP_SUPER_ADMIN_EMAIL: superadmin@example.com
      JP_SUPER_ADMIN_PASSWORD: SuperAdmin123!
      # Master Key
      AUTH_JWT_ACCESS_SECRET: 30afa7c25660d388d43ce9acb3c492a33093d668a823636e871eef8030412352
      AUTH_JWT_ACCESS_TTL_SECONDS: 3600
      AUTH_REFRESH_SECRET: 30afa7c25660d388d43ce9acb3c492a33093d668a823636e871eef8030412352
      AUTH_REFRESH_TTL_SECONDS: 2592000
      AUTH_JWT_ISSUER: jurnapod-api
      AUTH_JWT_AUDIENCE: jurnapod-clients
      PLATFORM_SETTINGS_ENCRYPTION_KEY: 30afa7c25660d388d43ce9acb3c492a33093d668a823636e871eef8030412352
      CRON_EMAIL_OUTBOX_SECRET: 30afa7c25660d388d43ce9acb3c492a33093d668a823636e871eef8030412352

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library packages for test runtime resolution
        run: npm run build:libs

      - name: Install DB and seed
        run: npm run db:migrate && npm run db:seed && npm run db:seed:test-data && npm run db:smoke

      - name: Run test server
        run: npm run test-server -w @jurnapod/api &

      - name: Run tests across all workspaces
        run: npm run test -ws --if-present
        id: test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/test-results*.json
            **/coverage
          retention-days: 7
