name: Typecheck

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck (all workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck across all workspaces
        run: npm run typecheck --workspaces --if-present
