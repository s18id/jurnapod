name: Typecheck

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck (all workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        # Build all packages first so dist/ outputs exist for TypeScript project references.
        # Apps like @jurnapod/api import from @jurnapod/db/kysely which resolves to dist/
        # via the package exports map (moduleResolution: Bundler).
        run: npm run build

      - name: Run typecheck across all workspaces
        run: npm run typecheck --workspaces --if-present
