# BMAD Agent Model Configuration
# Maps BMAD agents to optimal AI models based on capability and cost
# Generated: 2026-03-15

# Strategy: OpenCode Go Primary (your subscription)
# - Use opencode-go/minimax-m2.5 as primary for most tasks
# - Use openai/gpt-5.1-codex-mini for code-specific tasks
# - Use anthropic/claude-3-5-sonnet for complex reasoning only

# Agent to Model Mappings
agent_models:
  # Core/Master agents - use minimax for orchestration
  bmad-master:
    model: "opencode-go/minimax-m2.5"
    description: "Orchestration and complex decision making"
    
  # Development agents - use Codex for code tasks (best for coding)
  bmad-dev:
    model: "openai/gpt-5.1-codex-mini"
