# BMAD Agent Model Configuration
# Maps BMAD agents to optimal AI models based on capability and cost
# Generated: 2026-03-15

# Strategy: OpenCode Go Primary (your subscription)
# - Use opencode-go/minimax-m2.5 as primary for most tasks
# - Use openai/gpt-5.1-codex-mini for code-specific tasks
# - Use anthropic/claude-3-5-sonnet for complex reasoning only

# Agent to Model Mappings
agent_models:
  # Core/Master agents - use kimi for orchestration (needs full context)
  bmad-master:
    model: "opencode-go/kimi-k2.5"
    description: "Orchestration and complex decision making - needs full project state"
    
  # Development agents - narrow scope tasks on minimax, broader on kimi
  # Decomposition strategy: break into 2-4 hour focused chunks
  bmad-dev:
    model: "opencode-go/kimi-k2.5"
    description: "Main dev with decomposition strategy - broader context needed"
    
  bmad-quick-flow-solo-dev:
    model: "opencode-go/minimax-m2.5"
    description: "Rapid implementation - narrow focused tasks"
    
  bmad-quick-dev:
    model: "opencode-go/minimax-m2.5"
    description: "Quick fixes - narrow scope tasks"
    
  bmad-dev-story:
    model: "opencode-go/kimi-k2.5"
    description: "Story implementation with clear AC boundaries"
    
  # QA/Testing agents - standardized workflows on minimax
